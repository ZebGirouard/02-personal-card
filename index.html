<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <!-- Edit the image URL by changing the src value below. -->
      <img
        class="avatar"
        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=320&q=80"
        alt="Profile placeholder"
      />
      <section class="content">
        <!-- Edit the text in this section first. -->
        <p class="eyebrow">Learning to code in public</p>
        <h1>Your Name</h1>
        <p class="summary">Write one sentence about what you are building or curious about.</p>
        <ul class="stats">
          <li><strong>Current focus</strong><span>HTML + CSS</span></li>
          <li><strong>Building next</strong><span>Personal site</span></li>
          <li><strong>Favorite debug tool</strong><span>DevTools</span></li>
        </ul>
        <!-- Edit the href values to point to your real links. -->
        <nav class="links">
          <a href="https://github.com/">GitHub</a>
          <a href="https://www.linkedin.com/">LinkedIn</a>
          <a href="https://example.com/">Portfolio</a>
        </nav>
      </section>
    </main>
  </body>
</html>
