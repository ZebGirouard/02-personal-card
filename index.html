<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <img
        class="avatar"
        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=320&q=80"
        alt="Profile placeholder"
      />
      <div>
        <p class="eyebrow">Learning to code in public</p>
        <h1>Your Name</h1>
        <p>Write one sentence about what you are building or curious about.</p>
        <nav class="links">
          <a href="https://github.com/">GitHub</a>
          <a href="https://www.linkedin.com/">LinkedIn</a>
          <a href="https://example.com/">Portfolio</a>
        </nav>
      </div>
    </main>
  </body>
</html>
